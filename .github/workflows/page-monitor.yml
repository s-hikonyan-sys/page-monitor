name: General Page UI Monitor

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 JST 10:00 (UTC 01:00)
    - cron: '0 5 * * *'  # 毎日 JST 14:00 (UTC 05:00)
    - cron: '0 9 * * *'  # 毎日 JST 18:00 (UTC 09:00)
  workflow_dispatch:

jobs:
  check-and-notify:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install .
          python -m playwright install chromium --with-deps

      - name: Run Pipeline
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AI_PROMPT: ${{ secrets.AI_PROMPT }}
          AI_PROMPT_PROPOSAL: ${{ secrets.AI_PROMPT_PROPOSAL }}
          AI_PROMPT_PM: ${{ secrets.AI_PROMPT_PM }}
          PARSE_CONFIG: ${{ secrets.PARSE_CONFIG }}
          DETAIL_CONFIG: ${{ secrets.DETAIL_CONFIG }}
          PROMPT_PHASE2: ${{ secrets.PROMPT_PHASE2 }}
          PROMPT_PHASE4: ${{ secrets.PROMPT_PHASE4 }}
          PROMPT_PHASE5: ${{ secrets.PROMPT_PHASE5 }}
          PROMPT_PHASE5_REVIEW_A: ${{ secrets.PROMPT_PHASE5_REVIEW_A }}
          PROMPT_PHASE5_REVIEW_B: ${{ secrets.PROMPT_PHASE5_REVIEW_B }}
          PROMPT_PHASE6_REVISION: ${{ secrets.PROMPT_PHASE6_REVISION }}
          PROMPT_PHASE7_REVIEW_A: ${{ secrets.PROMPT_PHASE7_REVIEW_A }}
          PROMPT_PHASE7_REVIEW_B: ${{ secrets.PROMPT_PHASE7_REVIEW_B }}
          PHASE2_FIELDS: ${{ secrets.PHASE2_FIELDS }}
          PHASE4_FIELDS: ${{ secrets.PHASE4_FIELDS }}
          PHASE5_FIELDS: ${{ secrets.PHASE5_FIELDS }}
          PHASE5_REVIEW_A_FIELDS: ${{ secrets.PHASE5_REVIEW_A_FIELDS }}
          PHASE5_REVIEW_B_FIELDS: ${{ secrets.PHASE5_REVIEW_B_FIELDS }}
          PHASE6_FIELDS: ${{ secrets.PHASE6_FIELDS }}
          PHASE7_REVIEW_A_FIELDS: ${{ secrets.PHASE7_REVIEW_A_FIELDS }}
          PHASE7_REVIEW_B_FIELDS: ${{ secrets.PHASE7_REVIEW_B_FIELDS }}
          NOTIFY_PHASE4_PASSED_HEADER: ${{ secrets.NOTIFY_PHASE4_PASSED_HEADER }}
          NOTIFY_PHASE5_DRAFT_REVIEW_HEADER: ${{ secrets.NOTIFY_PHASE5_DRAFT_REVIEW_HEADER }}
          NOTIFY_PHASE6_HEADER: ${{ secrets.NOTIFY_PHASE6_HEADER }}
          NOTIFY_PHASE7_HEADER: ${{ secrets.NOTIFY_PHASE7_HEADER }}
          PHASE2_PASS_FIELD: ${{ secrets.PHASE2_PASS_FIELD }}
          PHASE4_PASS_FIELD: ${{ secrets.PHASE4_PASS_FIELD }}
          NOTIFY_HEADER: ${{ secrets.NOTIFY_HEADER }}
          NOTIFY_NO_NEW_HEADER: ${{ secrets.NOTIFY_NO_NEW_HEADER }}
          NOTIFY_SEED_HEADER: ${{ secrets.NOTIFY_SEED_HEADER }}
          NOTIFY_PHASE2_REJECTED_HEADER: ${{ secrets.NOTIFY_PHASE2_REJECTED_HEADER }}
          NOTIFY_PHASE4_REJECTED_HEADER: ${{ secrets.NOTIFY_PHASE4_REJECTED_HEADER }}
          NOTIFY_PHASE5_EMPTY_HEADER: ${{ secrets.NOTIFY_PHASE5_EMPTY_HEADER }}
          NOTIFY_BELOW_THRESHOLD_HEADER: ${{ secrets.NOTIFY_BELOW_THRESHOLD_HEADER }}
          NOTIFY_SUCCESS_SUMMARY_HEADER: ${{ secrets.NOTIFY_SUCCESS_SUMMARY_HEADER }}
          NOTIFY_URL_TEMPLATE: ${{ secrets.NOTIFY_URL_TEMPLATE }}
          NOTIFY_FIELDS: ${{ secrets.NOTIFY_FIELDS }}
          NOTIFY_SUMMARY_SAMPLE_MAX: ${{ vars.NOTIFY_SUMMARY_SAMPLE_MAX }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          PASS_THRESHOLD: ${{ vars.PASS_THRESHOLD }}
          MAX_PAGES: ${{ vars.MAX_PAGES }}
          MAX_API_USAGE: ${{ vars.MAX_API_USAGE }}
          RESET_HOUR_UTC: ${{ vars.RESET_HOUR_UTC }}
          GEMINI_429_RETRY_SEC: ${{ vars.GEMINI_429_RETRY_SEC }}
        run: python monitor.py

      - name: Commit and Push State
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_ids.txt api_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update state files" && git push)
